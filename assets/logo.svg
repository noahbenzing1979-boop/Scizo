<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">Scizo PRISM Engine Logo</title>
  <desc id="desc">A glowing PRISM die mark for the Scizo engine.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060812"/>
      <stop offset="1" stop-color="#061b1b"/>
    </linearGradient>
    <radialGradient id="glowA" cx="32%" cy="30%" r="58%">
      <stop offset="0" stop-color="#7df9ff" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#7df9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="72%" cy="35%" r="54%">
      <stop offset="0" stop-color="#ff2a6d" stop-opacity="0.3"/>
